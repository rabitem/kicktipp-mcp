name: MCPB Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Package MCPB
        run: npm run mcpb:pack

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kicktipp-mcp-mcpb
          path: |
            release/*.mcpb
            release/*.mcpb.sha256
          if-no-files-found: error

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" release/*.mcpb release/*.mcpb.sha256 --clobber
